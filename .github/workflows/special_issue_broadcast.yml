name: Special Issue Broadcast

on:
  workflow_dispatch:

jobs:
  send-special-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run special issue broadcast
        env:
          EMAIL_SENDER:             ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:           ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:          ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_RECIPIENT_YIFAN:    ${{ secrets.EMAIL_RECIPIENT_YIFAN }}
          EMAIL_RECIPIENT_HAIHUANG: ${{ secrets.EMAIL_RECIPIENT_HAIHUANG }}
          EMAIL_RECIPIENT_JIAHUITAN: ${{ secrets.EMAIL_RECIPIENT_JIAHUITAN }}
          EMAIL_RECIPIENT_SHANGYIN: ${{ secrets.EMAIL_RECIPIENT_SHANGYIN }}
        run: python3 special_issue_broadcast.py --send
