name: Catch-up Digest (One-time)

# 一次性补发工作流——用于发送2026年3月期间因 RSS 问题漏发的文章。
# 使用后请在 GitHub Actions → Workflows 中禁用或删除本文件。

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "测试模式（不写缓存，邮件标题加'测试·'）"
        type: boolean
        default: true

jobs:
  catchup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run catch-up (test)
        if: inputs.test_mode == true
        env:
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_RECIPIENT_YIFAN:     ${{ secrets.EMAIL_RECIPIENT_YIFAN }}
          EMAIL_RECIPIENT_HAIHUANG:  ${{ secrets.EMAIL_RECIPIENT_HAIHUANG }}
          EMAIL_RECIPIENT_JIAHUITAN: ${{ secrets.EMAIL_RECIPIENT_JIAHUITAN }}
        run: python catchup.py --test

      - name: Run catch-up (正式)
        if: inputs.test_mode == false
        env:
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_RECIPIENT_YIFAN:     ${{ secrets.EMAIL_RECIPIENT_YIFAN }}
          EMAIL_RECIPIENT_HAIHUANG:  ${{ secrets.EMAIL_RECIPIENT_HAIHUANG }}
          EMAIL_RECIPIENT_JIAHUITAN: ${{ secrets.EMAIL_RECIPIENT_JIAHUITAN }}
        run: python catchup.py

      - name: Commit updated cache files (正式模式)
        if: inputs.test_mode == false
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json seen_yifanxu.json seen_haihuang.json seen_jiahuitan.json
          git diff --cached --quiet || git commit -m "chore: catch-up run — update seen articles [skip ci]"
          git push
