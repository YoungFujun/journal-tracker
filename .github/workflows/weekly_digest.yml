name: Weekly Journal Digest

on:
  schedule:
    # 每周一 UTC 01:00（北京/大阪时间 09:00）
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      run_main:
        description: "Run journal_tracker.py (main, 正式)"
        type: boolean
        default: true
      test_main:
        description: "Run journal_tracker.py (main, 测试·不写缓存)"
        type: boolean
        default: false
      test_label:
        description: "测试邮件标题标签（test_main=true 时生效）"
        type: string
        default: ""
      run_yifanxu:
        description: "Run yifanxu.py"
        type: boolean
        default: true
      run_haihuang:
        description: "Run haihuang.py"
        type: boolean
        default: true
      run_jiahuitan:
        description: "Run jiahuitan.py"
        type: boolean
        default: true
      run_shangyin:
        description: "Run shangyin.py"
        type: boolean
        default: true

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run tracker (main, 正式)
        if: github.event_name == 'schedule' || inputs.run_main == true
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_ALERT:     ${{ secrets.EMAIL_ALERT }}
        run: python journal_tracker.py

      - name: Run tracker (main, 测试)
        if: inputs.test_main == true
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_ALERT:     ${{ secrets.EMAIL_ALERT }}
          TEST_LABEL:      ${{ inputs.test_label }}
        run: python journal_tracker.py --test

      - name: Run tracker (yifanxu)
        if: github.event_name == 'schedule' || inputs.run_yifanxu == true
        env:
          EMAIL_SENDER:          ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:        ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT_YIFAN: ${{ secrets.EMAIL_RECIPIENT_YIFAN }}
          EMAIL_ALERT:           ${{ secrets.EMAIL_ALERT }}
        run: python yifanxu.py

      - name: Run tracker (haihuang)
        if: github.event_name == 'schedule' || inputs.run_haihuang == true
        env:
          EMAIL_SENDER:             ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:           ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT_HAIHUANG: ${{ secrets.EMAIL_RECIPIENT_HAIHUANG }}
          EMAIL_ALERT:              ${{ secrets.EMAIL_ALERT }}
        run: python haihuang.py

      - name: Run tracker (jiahuitan)
        if: github.event_name == 'schedule' || inputs.run_jiahuitan == true
        env:
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT_JIAHUITAN: ${{ secrets.EMAIL_RECIPIENT_JIAHUITAN }}
          EMAIL_ALERT:               ${{ secrets.EMAIL_ALERT }}
        run: python jiahuitan.py

      - name: Run tracker (shangyin)
        if: github.event_name == 'schedule' || inputs.run_shangyin == true
        env:
          EMAIL_SENDER:             ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:           ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT_SHANGYIN: ${{ secrets.EMAIL_RECIPIENT_SHANGYIN }}
          EMAIL_ALERT:              ${{ secrets.EMAIL_ALERT }}
        run: python shangyin.py

      - name: Commit updated cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/*.json
          git diff --cached --quiet || git commit -m "chore: update seen articles [skip ci]"
          git push
