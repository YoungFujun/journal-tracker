name: Weekly Journal Digest

on:
  schedule:
    # 每周一 UTC 01:00（北京/大阪时间 09:00）
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      run_main:
        description: "Run journal_tracker.py (main, 正式)"
        type: boolean
        default: true
      test_main:
        description: "Run journal_tracker.py (main, 测试·不写缓存)"
        type: boolean
        default: false
      test_label:
        description: "测试邮件标题标签（test_main=true 时生效）"
        type: string
        default: ""
      run_xu:
        description: "Run xu.py"
        type: boolean
        default: true
      run_huang:
        description: "Run huang.py"
        type: boolean
        default: true
      run_tan:
        description: "Run tan.py"
        type: boolean
        default: true
      run_yin:
        description: "Run yin.py"
        type: boolean
        default: true

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run trackers (正式)
        if: github.event_name == 'schedule' || inputs.run_main == true || inputs.run_xu == true || inputs.run_huang == true || inputs.run_tan == true || inputs.run_yin == true
        env:
          EMAIL_SENDER:             ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:           ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:          ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_RECIPIENT_XU:       ${{ secrets.EMAIL_RECIPIENT_XU != '' && secrets.EMAIL_RECIPIENT_XU || secrets.EMAIL_RECIPIENT_YIFAN }}
          EMAIL_RECIPIENT_HUANG:    ${{ secrets.EMAIL_RECIPIENT_HUANG != '' && secrets.EMAIL_RECIPIENT_HUANG || secrets.EMAIL_RECIPIENT_HAIHUANG }}
          EMAIL_RECIPIENT_TAN:      ${{ secrets.EMAIL_RECIPIENT_TAN != '' && secrets.EMAIL_RECIPIENT_TAN || secrets.EMAIL_RECIPIENT_JIAHUITAN }}
          EMAIL_RECIPIENT_YIN:      ${{ secrets.EMAIL_RECIPIENT_YIN != '' && secrets.EMAIL_RECIPIENT_YIN || secrets.EMAIL_RECIPIENT_SHANGYIN }}
          EMAIL_ALERT:              ${{ secrets.EMAIL_ALERT }}
          RUN_MAIN:                 ${{ github.event_name == 'schedule' || inputs.run_main == true }}
          RUN_XU:                   ${{ github.event_name == 'schedule' || inputs.run_xu == true }}
          RUN_HUANG:                ${{ github.event_name == 'schedule' || inputs.run_huang == true }}
          RUN_TAN:                  ${{ github.event_name == 'schedule' || inputs.run_tan == true }}
          RUN_YIN:                  ${{ github.event_name == 'schedule' || inputs.run_yin == true }}
        run: python run_all_trackers.py

      - name: Run tracker (main, 测试)
        if: inputs.test_main == true
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_ALERT:     ${{ secrets.EMAIL_ALERT }}
          TEST_LABEL:      ${{ inputs.test_label }}
        run: python journal_tracker.py --test

      - name: Commit updated cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/*.json
          git diff --cached --quiet || git commit -m "chore: update seen articles [skip ci]"
          git push
